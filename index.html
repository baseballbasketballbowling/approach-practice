<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>アプローチ練習 — 距離打ち分け</title>
<style>
  :root{
    --turf:#10301F;
    --turf-2:#1A4530;
    --chalk:#F4F1E4;
    --board:#F2C14E;
    --board-ink:#1B1B14;
    --flag:#E23D2E;
    --mist:#8FAF9B;
    --line:rgba(244,241,228,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:
      radial-gradient(120% 60% at 50% -10%, #22573C 0%, transparent 60%),
      var(--turf);
    color:var(--chalk);
    min-height:100dvh;
    display:flex;flex-direction:column;
    max-width:520px;margin:0 auto;
    padding:14px 16px calc(18px + env(safe-area-inset-bottom));
  }
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    padding-bottom:10px;border-bottom:1px solid var(--line);
  }
  header h1{font-size:15px;font-weight:700;letter-spacing:.06em}
  header .range{font-size:12px;color:var(--mist);font-variant-numeric:tabular-nums}

  /* ---- ヤーデージボード(看板) ---- */
  .board-wrap{display:flex;justify-content:center;padding:26px 0 10px}
  .board{
    position:relative;
    width:min(280px,80%);
    background:var(--board);
    color:var(--board-ink);
    border-radius:10px;
    padding:18px 10px 14px;
    text-align:center;
    box-shadow:0 10px 0 -4px #C79A33, 0 18px 30px rgba(0,0,0,.45);
    transform:rotate(-1.2deg);
    transition:transform .25s ease;
  }
  .board.pop{animation:pop .45s ease}
  @keyframes pop{0%{transform:rotate(-1.2deg) scale(.92)}55%{transform:rotate(-1.2deg) scale(1.04)}100%{transform:rotate(-1.2deg) scale(1)}}
  .board::before,.board::after{ /* 看板の脚 */
    content:"";position:absolute;bottom:-22px;width:10px;height:24px;
    background:#5A4A2A;border-radius:2px;z-index:-1;
  }
  .board::before{left:26%}.board::after{right:26%}
  .board .num{
    font-family:"Arial Black","Hiragino Sans",sans-serif;
    font-weight:900;font-size:96px;line-height:1;
    letter-spacing:-.02em;font-variant-numeric:tabular-nums;
  }
  .board .unit{
    font-size:13px;font-weight:800;letter-spacing:.5em;margin-top:4px;
    padding-left:.5em; /* letter-spacing の右余白補正 */
  }
  .board .idle{font-size:22px;font-weight:800;padding:30px 0;letter-spacing:.1em}

  .status{
    text-align:center;min-height:22px;font-size:14px;color:var(--mist);
    margin:22px 0 6px;
  }
  .status.listening{color:var(--flag);font-weight:700}
  .status.ok{color:#8FD6A8;font-weight:700}

  /* ---- 操作 ---- */
  .controls{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  button{
    font-family:inherit;border:none;cursor:pointer;border-radius:14px;
    font-weight:700;color:var(--chalk);
  }
  button:focus-visible{outline:3px solid var(--board);outline-offset:2px}
  .btn-main{
    background:var(--flag);font-size:19px;padding:18px;
    box-shadow:0 4px 0 #A82A1E;
    letter-spacing:.05em;
  }
  .btn-main:active{transform:translateY(3px);box-shadow:0 1px 0 #A82A1E}
  .btn-mic{
    background:var(--turf-2);border:1px solid var(--line);
    font-size:16px;padding:15px;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-mic.rec{background:var(--flag);border-color:transparent;animation:pulse 1.1s infinite}
  @keyframes pulse{50%{opacity:.75}}
  .row{display:flex;gap:8px}
  .row button{flex:1;padding:13px 4px;font-size:14px;background:var(--turf-2);border:1px solid var(--line)}
  .row button:active{background:#245A3E}
  .sub{display:flex;gap:8px}
  .sub button{flex:1;background:transparent;border:1px solid var(--line);color:var(--mist);font-size:13px;padding:10px}

  /* ---- 記録 ---- */
  .stats{
    display:flex;border:1px solid var(--line);border-radius:12px;margin-top:20px;
    overflow:hidden;
  }
  .stats div{flex:1;text-align:center;padding:10px 4px}
  .stats div+div{border-left:1px solid var(--line)}
  .stats b{display:block;font-size:22px;font-variant-numeric:tabular-nums}
  .stats span{font-size:11px;color:var(--mist)}
  .log{margin-top:14px;list-style:none;max-height:200px;overflow-y:auto}
  .log li{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 4px;border-bottom:1px dashed var(--line);
    font-size:14px;font-variant-numeric:tabular-nums;
  }
  .log .t{font-weight:800;width:64px}
  .log .d{width:90px;text-align:right;font-weight:700}
  .d.short{color:#7FB7E0}.d.over{color:#F0A05A}.d.just{color:#8FD6A8}.d.miss{color:var(--mist)}
  .log .del{background:none;color:var(--mist);font-size:12px;padding:4px 6px}
  .empty{color:var(--mist);font-size:13px;text-align:center;padding:18px 0}

  /* ---- 設定 ---- */
  details{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  summary{font-size:13px;color:var(--mist);cursor:pointer;list-style:none}
  summary::before{content:"⚙ "}
  .settings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;font-size:13px}
  .settings label{display:flex;flex-direction:column;gap:4px;color:var(--mist)}
  .settings select,.settings input{
    background:var(--turf-2);color:var(--chalk);border:1px solid var(--line);
    border-radius:8px;padding:9px;font-size:15px;font-family:inherit;
  }
  .toggle{grid-column:1/-1;flex-direction:row!important;align-items:center;gap:8px!important}
  .toggle input{width:20px;height:20px}
  @media (prefers-reduced-motion:reduce){
    .board.pop{animation:none}.btn-mic.rec{animation:none}
  }
</style>
</head>
<body>

<header>
  <h1>アプローチ練習</h1>
  <div class="range" id="rangeLabel">50–100yd</div>
</header>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="idle" id="boardIdle">READY</div>
    <div class="num" id="boardNum" style="display:none">65</div>
    <div class="unit" id="boardUnit" style="display:none">YARDS</div>
  </div>
</div>

<div class="status" id="status">「スタート」で最初の距離を読み上げます</div>

<div class="controls">
  <button class="btn-main" id="mainBtn">スタート</button>

  <button class="btn-mic" id="micBtn" style="display:none">🎤 ハンズフリー OFF — タップで常時聞き取り</button>

  <div class="row" id="quickRow" style="display:none">
    <button data-diff="-10">ショート10</button>
    <button data-diff="-5">ショート5</button>
    <button data-diff="0">ピッタリ</button>
    <button data-diff="5">オーバー5</button>
    <button data-diff="10">オーバー10</button>
  </div>

  <div class="sub" id="subRow" style="display:none">
    <button id="missBtn">ミス（打ち直し）</button>
    <button id="repeatBtn">もう一度読み上げ</button>
  </div>
</div>

<div class="stats" id="stats" style="display:none">
  <div><b id="stCount">0</b><span>球数</span></div>
  <div><b id="stJust">0%</b><span>ピッタリ率</span></div>
  <div><b id="stAvg">–</b><span>平均誤差(yd)</span></div>
</div>

<ul class="log" id="log"></ul>
<div class="empty" id="empty">記録はまだありません</div>

<details>
  <summary>設定</summary>
  <div class="settings">
    <label>最短距離
      <select id="minDist">
        <option>30</option><option>40</option><option selected>50</option>
        <option>60</option><option>70</option>
      </select>
    </label>
    <label>最長距離
      <select id="maxDist">
        <option>70</option><option>80</option><option>90</option>
        <option selected>100</option><option>110</option><option>120</option>
      </select>
    </label>
    <label>刻み幅
      <select id="step">
        <option value="5" selected>5ヤード</option>
        <option value="10">10ヤード</option>
      </select>
    </label>
    <label>記録後の自動読み上げ
      <select id="autoNext">
        <option value="3" selected>3秒後</option>
        <option value="5">5秒後</option>
        <option value="0">手動（次へを押す）</option>
      </select>
    </label>
    <label class="toggle"><input type="checkbox" id="voiceOn" checked> 音声読み上げを使う</label>
  </div>
</details>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const state = {
    running:false, target:null, lastTarget:null,
    log:[], autoTimer:null
  };

  /* ---------- 音声読み上げ ---------- */
  let speaking = false;
  function speak(text, cb){
    if(!$('voiceOn').checked || !('speechSynthesis' in window)){ if(cb) cb(); return; }
    speechSynthesis.cancel();
    pauseRecog(); // 自分の声を拾わないように読み上げ中はマイクを止める
    speaking = true;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = 1.0;
    const v = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'));
    if(v) u.voice = v;
    u.onend = u.onerror = () => {
      speaking = false;
      resumeRecogSoon();
      if(cb) cb();
    };
    speechSynthesis.speak(u);
  }
  if('speechSynthesis' in window) speechSynthesis.getVoices();

  /* ---------- 音声認識（常時オン / ハンズフリー） ---------- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null, handsfree = false, recActive = false, restartTimer = null;
  if(SR){
    recog = new SR();
    recog.lang = 'ja-JP';
    recog.continuous = true;
    recog.interimResults = false;
    recog.maxAlternatives = 3;
    recog.onresult = e => {
      for(let i = e.resultIndex; i < e.results.length; i++){
        const alts = [...e.results[i]].map(r => r.transcript);
        let done = false;
        for(const t of alts){ if(handleSpeech(t)){ done = true; break; } }
        if(!done && state.running && alts[0].trim().length > 1){
          setStatus(`「${alts[0]}」は認識できませんでした`);
        }
      }
    };
    recog.onend = () => {
      recActive = false;
      // ブラウザが勝手に止めても、ハンズフリー中は自動で再開する
      if(handsfree && !speaking) resumeRecogSoon();
      updateMicUI();
    };
    recog.onerror = e => {
      recActive = false;
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        handsfree = false;
        $('micBtn').style.display = 'none';
        setStatus('マイクが使えない環境です。ボタンで記録してください');
        releaseWakeLock();
      }
      updateMicUI();
    };
  }
  function tryStartRecog(){
    if(!recog || recActive || speaking || !handsfree) return;
    try{ recog.start(); recActive = true; }catch(_){}
    updateMicUI();
  }
  function pauseRecog(){
    clearTimeout(restartTimer);
    if(recog && recActive){ try{ recog.abort(); }catch(_){} recActive = false; }
    updateMicUI();
  }
  function resumeRecogSoon(){
    clearTimeout(restartTimer);
    restartTimer = setTimeout(tryStartRecog, 300);
  }
  function toggleHandsfree(){
    handsfree = !handsfree;
    if(handsfree){
      tryStartRecog();
      requestWakeLock();
      setStatus('ハンズフリーON — 結果や「次」「もう一度」を話してください', 'listening');
    }else{
      pauseRecog();
      releaseWakeLock();
      setStatus('ハンズフリーOFF — ボタンで記録できます');
    }
    updateMicUI();
  }
  function updateMicUI(){
    const b = $('micBtn');
    if(handsfree){
      b.classList.add('rec');
      b.textContent = recActive ? '🎙 聞き取り中（タップでOFF）' : '🎙 再接続中…';
    }else{
      b.classList.remove('rec');
      b.textContent = '🎤 ハンズフリー OFF — タップで常時聞き取り';
    }
  }

  /* ---------- 画面スリープ防止（対応ブラウザのみ） ---------- */
  let wakeLock = null;
  async function requestWakeLock(){
    try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(_){}
  }
  function releaseWakeLock(){
    try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(_){}
  }
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && handsfree){ requestWakeLock(); resumeRecogSoon(); }
  });

  /* ---------- 音声の解釈 ---------- */
  function toHalfWidth(s){ return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }
  function handleSpeech(raw){
    const t = toHalfWidth(raw).replace(/\s/g,'');
    const numMatch = t.match(/(\d+(?:\.\d+)?)/);
    const n = numMatch ? parseFloat(numMatch[1]) : null;

    // 音声コマンド
    if(/スキップ|次(の距離)?へ?$|^つぎ/.test(t)){ nextTarget(); return true; }
    if(/もう一度|もういちど|リピート|何ヤード|なんやーど/.test(t)){
      if(state.running) speak(`${state.target}ヤード`);
      return true;
    }

    if(!state.running) return false;
    if(/ぴったり|ピッタリ|ジャスト|じゃすと|ナイス/.test(t)){ record(0); return true; }
    if(/ミス|みす|ダフ|だふ|トップ|とっぷ|チョロ|ちょろ|シャンク/.test(t)){ recordMiss(); return true; }
    if(/ショート|しょーと|手前|てまえ/.test(t)){ record(-(n ?? 5)); return true; }
    if(/オーバー|おーばー|奥|おく/.test(t)){ record(+(n ?? 5)); return true; }
    if(n !== null && n >= 20 && n <= 160){ record(n - state.target, n); return true; }
    return false;
  }

  /* ---------- 記録 ---------- */
  function record(diff, carry){
    clearTimeout(state.autoTimer);
    state.log.unshift({target:state.target, diff, carry:carry ?? null, miss:false});
    render();
    const say = diff===0 ? 'ピッタリ、ナイスショット'
      : diff<0 ? `ショート${Math.abs(diff)}ヤード` : `オーバー${diff}ヤード`;
    setStatus(`記録：${state.target}yd → ${fmtDiff(diff)}`, 'ok');
    speak(`${say}、記録しました`, scheduleNext);
    if(!$('voiceOn').checked) scheduleNext();
  }
  function recordMiss(){
    clearTimeout(state.autoTimer);
    setStatus('ミス — 同じ距離でもう一度', 'ok');
    speak(`ミス。もう一度、${state.target}ヤード`);
  }
  function scheduleNext(){
    const wait = parseInt($('autoNext').value,10);
    if(wait===0){ $('mainBtn').textContent='次の距離へ'; return; }
    state.autoTimer = setTimeout(nextTarget, wait*1000);
  }

  /* ---------- 距離の出題 ---------- */
  function candidates(){
    const min = +$('minDist').value, max = +$('maxDist').value, step = +$('step').value;
    const arr=[]; for(let d=min; d<=max; d+=step) arr.push(d);
    return arr;
  }
  function nextTarget(){
    clearTimeout(state.autoTimer);
    let pool = candidates().filter(d=>d!==state.lastTarget);
    if(pool.length===0) pool = candidates();
    state.target = pool[Math.floor(Math.random()*pool.length)];
    state.lastTarget = state.target;
    state.running = true;

    $('boardIdle').style.display='none';
    $('boardNum').style.display='block';
    $('boardUnit').style.display='block';
    $('boardNum').textContent = state.target;
    const b=$('board'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');

    $('mainBtn').textContent='次の距離へ';
    if(recog) $('micBtn').style.display='flex';
    $('quickRow').style.display='flex';
    $('subRow').style.display='flex';
    $('stats').style.display='flex';

    setStatus('打ったら結果を記録してください');
    speak(`次は、${state.target}ヤード`);
  }

  /* ---------- 表示 ---------- */
  function fmtDiff(d){
    if(d===0) return 'ピッタリ';
    return d<0 ? `ショート${Math.abs(d)}` : `オーバー${d}`;
  }
  function setStatus(msg, cls){
    const el=$('status'); el.textContent=msg; el.className='status'+(cls?' '+cls:'');
  }
  function render(){
    const logEl=$('log'); logEl.innerHTML='';
    const shots = state.log.filter(e=>!e.miss);
    $('empty').style.display = state.log.length ? 'none':'block';
    state.log.forEach((e,i)=>{
      const li=document.createElement('li');
      const cls = e.diff===0?'just':(e.diff<0?'short':'over');
      li.innerHTML =
        `<span class="t">${e.target}yd</span>`+
        `<span>${e.carry!==null? e.carry+'yd':''}</span>`+
        `<span class="d ${cls}">${fmtDiff(e.diff)}</span>`+
        `<button class="del" data-i="${i}">削除</button>`;
      logEl.appendChild(li);
    });
    $('stCount').textContent = shots.length;
    const just = shots.filter(e=>e.diff===0).length;
    $('stJust').textContent = shots.length? Math.round(just/shots.length*100)+'%':'0%';
    const avg = shots.length? (shots.reduce((s,e)=>s+Math.abs(e.diff),0)/shots.length):null;
    $('stAvg').textContent = avg===null? '–': avg.toFixed(1);
  }
  $('log').addEventListener('click',e=>{
    const b=e.target.closest('.del'); if(!b) return;
    state.log.splice(+b.dataset.i,1); render();
  });

  /* ---------- イベント ---------- */
  $('mainBtn').addEventListener('click', nextTarget);
  $('micBtn').addEventListener('click', toggleHandsfree);
  $('quickRow').addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b||!state.running) return;
    record(parseInt(b.dataset.diff,10));
  });
  $('missBtn').addEventListener('click', ()=> state.running && recordMiss());
  $('repeatBtn').addEventListener('click', ()=> state.running && speak(`${state.target}ヤード`));
  ['minDist','maxDist','step'].forEach(id=>{
    $(id).addEventListener('change',()=>{
      let min=+$('minDist').value, max=+$('maxDist').value;
      if(min>=max){ $('maxDist').value = Math.max(min+10, 70); max=+$('maxDist').value; }
      $('rangeLabel').textContent = `${min}–${max}yd`;
    });
  });
})();
</script>
</body>
</html>
